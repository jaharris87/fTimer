name = "fTimer"
version = "0.1.0"
license = "BSD-3-Clause"
author = "J. Austin Harris"
description = "Lightweight, correctness-first wall-clock timing library for Fortran"

[build]
auto-executables = false
auto-tests = false
auto-examples = false

[library]
source-dir = "src"

[[example]]
name = "basic_usage"
source-dir = "examples"
main = "basic_usage.F90"

[[example]]
name = "nested_timers"
source-dir = "examples"
main = "nested_timers.F90"
