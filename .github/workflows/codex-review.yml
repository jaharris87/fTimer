name: Codex Review Triggers

# This workflow does NOT call any AI API. It posts @codex review comments
# which trigger native Codex GitHub review via your ChatGPT-linked account.
# The trigger comments are intentionally condensed to single lines because
# native Codex review did not reliably follow the previous long-form prompts.
# The long-form prompt library lives under .github/prompts/detailed/ for
# manual fallback reviews and non-triggered deep reviews.
#
# Prerequisites:
#   1. Create a fine-grained PAT with pull-requests:write on this repo
#   2. Add it as a repository secret named CODEX_TRIGGER_PAT
#   3. Create the review labels documented in docs/maintainer.md
#
# Why a PAT instead of github.token?
#   Codex ignores @codex review comments from github-actions[bot].
#   The PAT makes comments appear from your user account.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CODEX_REVIEW_COMMENT_SPACING_SECONDS: 30

jobs:
  software-review:
    if: github.event.label.name == 'codex-software-review'
    concurrency:
      group: codex-review-trigger-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for review trigger spacing window
        env:
          GH_TOKEN: ${{ secrets.CODEX_TRIGGER_PAT }}
        run: |
          last_created_at=""
          page=1

          while true; do
            page_comments="$(
              gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments?sort=created&direction=desc&per_page=100&page=${page}"
            )"
            page_count="$(printf '%s' "$page_comments" | jq 'length')"

            if [ "$page_count" -eq 0 ]; then
              break
            fi

            last_created_at="$(
              printf '%s' "$page_comments" \
                | jq -r '[.[] | select(.body | startswith("@codex review ")) | .created_at] | first // empty'
            )"

            if [ -n "$last_created_at" ]; then
              break
            fi

            page="$((page + 1))"
          done

          if [ -n "$last_created_at" ]; then
            now_epoch="$(date -u +%s)"
            last_epoch="$(date -u -d "$last_created_at" +%s)"
            elapsed="$((now_epoch - last_epoch))"
            remaining="$((CODEX_REVIEW_COMMENT_SPACING_SECONDS - elapsed))"

            if [ "$remaining" -gt 0 ]; then
              echo "Sleeping ${remaining}s to keep @codex review comments at least ${CODEX_REVIEW_COMMENT_SPACING_SECONDS}s apart."
              sleep "$remaining"
            fi
          fi

      - name: Post condensed software review trigger
        env:
          GH_TOKEN: ${{ secrets.CODEX_TRIGGER_PAT }}
        run: |
          printf '@codex review %s\n' "$(cat .github/prompts/software-review.md)" \
            > /tmp/codex-software-comment.md

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/codex-software-comment.md

  methodology-review:
    if: github.event.label.name == 'codex-methodology-review'
    concurrency:
