name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # Smoke tests validate the default build path (no pFUnit required).
      # pFUnit behavioral tests run in the test-serial job below.
      - name: Configure (serial)
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      # MPI smoke tests validate the MPI-enabled build path (no pFUnit required).
      # pFUnit MPI behavioral tests run in the test-mpi job below.
      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  test-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built without MPI in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-gfortran-openmpi-v4.16.0

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL https://github.com/Goddard-Fortran-Ecosystem/pFUnit/releases/download/v4.16.0/pFUnit-v4.16.0.tar | tar x --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-mpi:
    runs-on: ubuntu-latest
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      OMPI_MCA_rmaps_base_oversubscribe: 1
      PRTE_MCA_rmaps_default_mapping_policy: :oversubscribe
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-gfortran-openmpi-v4.16.0

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL https://github.com/Goddard-Fortran-Ecosystem/pFUnit/releases/download/v4.16.0/pFUnit-v4.16.0.tar | tar x --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # OpenMP smoke tests validate the OpenMP-enabled build path (no pFUnit required).
      # pFUnit OpenMP behavioral tests run in the test-openmp job below.
      - name: Configure (OpenMP)
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  test-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built with OpenMP (not MPI) in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-gfortran-openmpi-v4.16.0

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL https://github.com/Goddard-Fortran-Ecosystem/pFUnit/releases/download/v4.16.0/pFUnit-v4.16.0.tar | tar x --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      - name: Configure (bench)
        run: cmake -B build -DFTIMER_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: pip install fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
          find tests -name '*.F90' -exec fprettify --diff {} +
          find examples -name '*.F90' -exec fprettify --diff {} +
