name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PFUNIT_VERSION: v4.16.0
  PFUNIT_SHA256: 314381ff08dc99e87a4da5862501053d112babaf73244b1c04b77065d3fd3091
  PFUNIT_ARCHIVE_URL: https://github.com/Goddard-Fortran-Ecosystem/pFUnit/releases/download/v4.16.0/pFUnit-v4.16.0.tar

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # Smoke tests validate the default build path (no pFUnit required).
      # pFUnit behavioral tests run in the test-serial job below.
      - name: Configure (serial)
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-serial-flang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flang-19 cmake

      - name: Resolve Flang
        run: |
          if command -v flang-19 >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang-19" >> "$GITHUB_ENV"
          elif command -v flang-new-19 >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang-new-19" >> "$GITHUB_ENV"
          elif command -v flang >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang" >> "$GITHUB_ENV"
          else
            echo "No supported Flang executable found on PATH." >&2
            exit 1
          fi

      - name: Configure (Flang serial)
        run: FC=${{ env.FTIMER_FLANG_COMPILER }} cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      # MPI smoke tests validate the MPI-enabled build path (no pFUnit required).
      # pFUnit MPI behavioral tests run in the test-mpi job below.
      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi-mpich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake mpich libmpich-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Resolve MPICH tools
        run: |
          if command -v mpifort.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpifort.mpich)"
          elif command -v mpif90.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpif90.mpich)"
          else
            echo "No MPICH Fortran wrapper found on PATH." >&2
            exit 1
          fi

          if command -v mpiexec.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpiexec.mpich)"
          elif command -v mpirun.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpirun.mpich)"
          else
            echo "No MPICH launcher found on PATH." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/mpich-bin"
          ln -sf "$mpich_fc" "$RUNNER_TEMP/mpich-bin/mpifort"
          ln -sf "$mpich_mpiexec" "$RUNNER_TEMP/mpich-bin/mpiexec"
          echo "$RUNNER_TEMP/mpich-bin" >> "$GITHUB_PATH"
          echo "FTIMER_MPICH_FC=$mpich_fc" >> "$GITHUB_ENV"
          echo "FTIMER_MPICH_MPIEXEC=$mpich_mpiexec" >> "$GITHUB_ENV"

      - name: Show MPICH toolchain
        run: |
          "$FTIMER_MPICH_FC" --version
          "$FTIMER_MPICH_MPIEXEC" --version

      # MPICH smoke coverage uses the wrapper compiler explicitly, including
      # the configure-time mpi_f08 probe and installed MPI consumer check.
      - name: Configure (MPICH MPI)
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DMPIEXEC_EXECUTABLE="$FTIMER_MPICH_MPIEXEC"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

      - name: Verify MPICH example and installed-consumer coverage
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_mpi_example_smoke$'
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_installed_package_consumer_mpi$'

  test-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built without MPI in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-mpi:
    runs-on: ubuntu-latest
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      OMPI_MCA_rmaps_base_oversubscribe: 1
      PRTE_MCA_rmaps_default_mapping_policy: :oversubscribe
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-mpi-mpich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake mpich libmpich-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Resolve MPICH tools
        run: |
          if command -v mpifort.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpifort.mpich)"
          elif command -v mpif90.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpif90.mpich)"
          else
            echo "No MPICH Fortran wrapper found on PATH." >&2
            exit 1
          fi

          if command -v mpiexec.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpiexec.mpich)"
          elif command -v mpirun.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpirun.mpich)"
          else
            echo "No MPICH launcher found on PATH." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/mpich-bin"
          ln -sf "$mpich_fc" "$RUNNER_TEMP/mpich-bin/mpifort"
          ln -sf "$mpich_mpiexec" "$RUNNER_TEMP/mpich-bin/mpiexec"
          echo "$RUNNER_TEMP/mpich-bin" >> "$GITHUB_PATH"
          echo "FTIMER_MPICH_FC=$mpich_fc" >> "$GITHUB_ENV"
          echo "FTIMER_MPICH_MPIEXEC=$mpich_mpiexec" >> "$GITHUB_ENV"

      - name: Capture MPICH pFUnit cache identity
        id: pfunit-mpich-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            "$FTIMER_MPICH_FC" --version
            "$FTIMER_MPICH_FC" -show
            "$FTIMER_MPICH_MPIEXEC" --version
            cmake --version
          } > /tmp/pfunit-mpich-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-mpich-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache MPICH pFUnit
        uses: actions/cache@v4
        id: pfunit-mpich-cache
        with:
          path: /opt/pfunit-mpich
          key: pfunit-mpich-diagnostic-${{ runner.os }}-${{ steps.pfunit-mpich-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build MPICH pFUnit
        if: steps.pfunit-mpich-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-mpich-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit-mpich.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit-mpich.tar | sha256sum -c -
          tar -xf /tmp/pfunit-mpich.tar --strip-components=1 -C /tmp/pfunit-mpich-src
          FC=mpifort cmake -B /tmp/pfunit-mpich-build -S /tmp/pfunit-mpich-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit-mpich -DSKIP_MPI=NO -DENABLE_MPI_F08=ON
          cmake --build /tmp/pfunit-mpich-build -j$(nproc)
          cmake --install /tmp/pfunit-mpich-build

      - name: Diagnose MPICH pFUnit package
        run: |
          pfunit_config="$(find /opt/pfunit-mpich -path '*/cmake/PFUNITConfig.cmake' -print -quit)"
          if [ -z "$pfunit_config" ]; then
            echo "No MPICH pFUnit package config was installed." >&2
            exit 1
          fi
          echo "PFUNIT_CONFIG=$pfunit_config" >> "$GITHUB_ENV"
          grep 'set (PFUNIT_MPI_FOUND "TRUE")' "$pfunit_config"
          "$FTIMER_MPICH_FC" --version
          "$FTIMER_MPICH_FC" -show
          "$FTIMER_MPICH_MPIEXEC" --version
          pfunit_root="$(cd "$(dirname "$pfunit_config")/.." && pwd)"
          echo "PFUNIT_ROOT=$pfunit_root" >> "$GITHUB_ENV"
          nm -A "$pfunit_root"/lib/libpfunit.a "$pfunit_root"/lib/libfunit.a | grep -E 'funit_main|__pfunit_MOD_initialize|__funit_MOD_initialize|mpi_init' || true

      - name: Probe pFUnit MPI context
        run: |
          mkdir -p "$RUNNER_TEMP/pfunit-context-probe"
          cat > "$RUNNER_TEMP/pfunit-context-probe/CMakeLists.txt" <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(pfunit_context_probe LANGUAGES Fortran)
          find_package(MPI REQUIRED COMPONENTS Fortran)
          find_package(PFUNIT REQUIRED HINTS "$ENV{PFUNIT_ROOT}" "$ENV{PFUNIT_ROOT}/..")
          add_executable(pfunit_context_probe context_probe.F90)
          target_link_libraries(pfunit_context_probe PRIVATE PFUNIT::pfunit MPI::MPI_Fortran)
          EOF
          cat > "$RUNNER_TEMP/pfunit-context-probe/context_probe.F90" <<'EOF'
          program pfunit_context_probe
            use mpi_f08
            use PF_ParallelContext, only: ParallelContext
            use PF_MpiContext, only: MpiContext
            use pFUnit, only: initialize, finalize, get_context, stub
            implicit none
            class(ParallelContext), allocatable :: context
            integer :: ierr
            integer :: rank
            integer :: size

            call initialize(stub)
            call MPI_Comm_rank(MPI_COMM_WORLD, rank, ierr)
            call MPI_Comm_size(MPI_COMM_WORLD, size, ierr)
            allocate(context, source=get_context())
            select type (context)
            type is (MpiContext)
              print *, 'context_probe rank=', rank, 'world_size=', size, 'context_rank=', context%processRank(), 'context_size=', context%getNumProcesses()
            class default
              print *, 'context_probe rank=', rank, 'world_size=', size, 'context_is_mpi=F'
            end select
            call finalize(stub, .true.)
          end program pfunit_context_probe
          EOF
          FC=mpifort cmake -B "$RUNNER_TEMP/pfunit-context-probe/build" -S "$RUNNER_TEMP/pfunit-context-probe" -DPFUNIT_DIR="$PFUNIT_ROOT"
          cmake --build "$RUNNER_TEMP/pfunit-context-probe/build" --verbose
          "$FTIMER_MPICH_MPIEXEC" -n 2 "$RUNNER_TEMP/pfunit-context-probe/build/pfunit_context_probe"

      - name: Probe pFUnit driver main
        run: |
          mkdir -p "$RUNNER_TEMP/pfunit-driver-probe"
          cat > "$RUNNER_TEMP/pfunit-driver-probe/CMakeLists.txt" <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(pfunit_driver_probe LANGUAGES Fortran)
          find_package(MPI REQUIRED COMPONENTS Fortran)
          find_package(PFUNIT REQUIRED HINTS "$ENV{PFUNIT_ROOT}" "$ENV{PFUNIT_ROOT}/..")
          add_executable(pfunit_driver_probe driver_probe.F90)
          target_link_libraries(pfunit_driver_probe PRIVATE PFUNIT::pfunit MPI::MPI_Fortran)
          EOF
          cat > "$RUNNER_TEMP/pfunit-driver-probe/driver_probe.F90" <<'EOF'
          program pfunit_driver_probe
            use FUnit, only: TestSuite, stub
            implicit none
            call funit_main(load_tests, extra_initialize, stub)
          contains
            subroutine load_tests(suite)
              type(TestSuite), intent(inout) :: suite
            end subroutine load_tests
            subroutine extra_initialize()
              use mpi_f08
              logical :: initialized
              integer :: ierr
              integer :: rank
              integer :: size
              rank = -1
              size = -1
              call MPI_Initialized(initialized, ierr)
              if (initialized) then
                call MPI_Comm_rank(MPI_COMM_WORLD, rank, ierr)
                call MPI_Comm_size(MPI_COMM_WORLD, size, ierr)
              end if
              print *, 'driver_probe initialized=', initialized, 'rank=', rank, 'world_size=', size
            end subroutine extra_initialize
          end program pfunit_driver_probe
          EOF
          FC=mpifort cmake -B "$RUNNER_TEMP/pfunit-driver-probe/build" -S "$RUNNER_TEMP/pfunit-driver-probe" -DPFUNIT_DIR="$PFUNIT_ROOT"
          cmake --build "$RUNNER_TEMP/pfunit-driver-probe/build" --verbose
          "$FTIMER_MPICH_MPIEXEC" -n 2 "$RUNNER_TEMP/pfunit-driver-probe/build/pfunit_driver_probe"

      - name: Configure
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DFTIMER_BUILD_TESTS=ON -DFTIMER_BUILD_SMOKE_TESTS=OFF -DPFUNIT_DIR=/opt/pfunit-mpich -DMPIEXEC_EXECUTABLE="$FTIMER_MPICH_MPIEXEC"

      - name: Build MPI pFUnit tests
        run: cmake --build build --target ftimer_mpi_tests ftimer_mpi_tests_4pe --verbose -j$(nproc)

      - name: Show MPICH pFUnit tests
        run: ctest --test-dir build -N -V -R '^ftimer_mpi_tests(_4pe)?$'

      - name: Test MPICH MPI pFUnit
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_mpi_tests$'
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_mpi_tests_4pe$'

  build-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # OpenMP smoke tests validate the OpenMP-enabled build path (no pFUnit required).
      # pFUnit OpenMP behavioral tests run in the test-openmp job below.
      - name: Configure (OpenMP)
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-contract-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake make libopenmpi-dev openmpi-bin flang-19

      # These checks cover the configure-time negative gates and the Makefile
      # wrapper defaults that Issue #51 tracks as automated regressions.
      - name: Configure contract checks
        run: cmake -B build-contract -DFTIMER_BUILD_EXAMPLES=OFF

      - name: Run contract regression tests
        run: ctest --test-dir build-contract --output-on-failure -R "ftimer_(configure|make)_.*contracts"

  test-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built with OpenMP (not MPI) in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      - name: Configure (bench)
        run: cmake -B build -DFTIMER_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: python3 -m pip install --constraint .github/constraints/lint.txt fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
          find tests -name '*.F90' -exec fprettify --diff {} +
          find examples -name '*.F90' -exec fprettify --diff {} +

      - name: Check manual fallback audit helper
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/test_check_manual_fallback_audit.py
