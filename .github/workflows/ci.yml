name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # GitHub Actions currently exercises the default smoke-test path only.
      # The repo also contains opt-in pFUnit suites, but this workflow does not
      # provision PFUNIT_DIR or run those serial/MPI behavioral tests.
      - name: Configure (serial)
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      # The MPI job also follows the smoke-test path only. pFUnit MPI suites
      # exist in the repo but are not exercised here because PFUNIT_DIR is not
      # provisioned in this workflow.
      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: pip install fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
          find tests -name '*.F90' -exec fprettify --diff {} +
          find examples -name '*.F90' -exec fprettify --diff {} +
