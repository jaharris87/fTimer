name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      - name: Install pFUnit
        run: |
          git clone --depth 1 --branch v4.10.0 https://github.com/Goddard-Fortran-Ecosystem/pFUnit.git /tmp/pFUnit
          cmake -B /tmp/pFUnit/build -S /tmp/pFUnit -DCMAKE_INSTALL_PREFIX=/opt/pfunit
          cmake --build /tmp/pFUnit/build -j$(nproc)
          sudo cmake --install /tmp/pFUnit/build

      - name: Configure (serial)
        run: cmake -B build -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Install pFUnit (with MPI)
        run: |
          git clone --depth 1 --branch v4.10.0 https://github.com/Goddard-Fortran-Ecosystem/pFUnit.git /tmp/pFUnit
          cmake -B /tmp/pFUnit/build -S /tmp/pFUnit -DCMAKE_INSTALL_PREFIX=/opt/pfunit
          cmake --build /tmp/pFUnit/build -j$(nproc)
          sudo cmake --install /tmp/pFUnit/build

      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (serial)
        run: ctest --test-dir build --output-on-failure -LE mpi

      - name: Test (MPI, 2 ranks)
        run: ctest --test-dir build --output-on-failure -L mpi
        env:
          OMPI_MCA_rmaps_base_oversubscribe: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: pip install fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
