name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # Phase 0 intentionally validates the minimal scaffold without pFUnit.
      # Reintroduce pFUnit install + .pf test execution once the real test
      # suite lands in the implementation phases.
      - name: Configure (serial)
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      # Phase 0 only proves that the MPI-enabled scaffold configures and builds.
      # There are no MPI-labelled runtime tests yet; reintroduce those once the
      # pFUnit MPI suite exists.
      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: pip install fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
          find tests -name '*.F90' -exec fprettify --diff {} +
