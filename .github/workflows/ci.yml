name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PFUNIT_VERSION: v4.16.0
  PFUNIT_SHA256: 314381ff08dc99e87a4da5862501053d112babaf73244b1c04b77065d3fd3091
  PFUNIT_ARCHIVE_URL: https://github.com/Goddard-Fortran-Ecosystem/pFUnit/releases/download/v4.16.0/pFUnit-v4.16.0.tar

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # Smoke tests validate the default build path (no pFUnit required).
      # pFUnit behavioral tests run in the test-serial job below.
      - name: Configure (serial)
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-serial-flang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flang-19 cmake

      - name: Resolve Flang
        run: |
          if command -v flang-19 >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang-19" >> "$GITHUB_ENV"
          elif command -v flang-new-19 >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang-new-19" >> "$GITHUB_ENV"
          elif command -v flang >/dev/null 2>&1; then
            echo "FTIMER_FLANG_COMPILER=flang" >> "$GITHUB_ENV"
          else
            echo "No supported Flang executable found on PATH." >&2
            exit 1
          fi

      - name: Configure (Flang serial)
        run: FC=${{ env.FTIMER_FLANG_COMPILER }} cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-serial-nvhpc:
    runs-on: ubuntu-latest
    env:
      NVHPC_VERSION: 26.3
      NVHPC_APT_PACKAGE: nvhpc-26-3
    steps:
      - uses: actions/checkout@v6

      - name: Install NVHPC dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates cmake curl gfortran gnupg
          curl -fsSL https://developer.download.nvidia.com/hpc-sdk/ubuntu/DEB-GPG-KEY-NVIDIA-HPC-SDK \
            | sudo gpg --dearmor --yes -o /usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg
          echo 'deb [signed-by=/usr/share/keyrings/nvidia-hpcsdk-archive-keyring.gpg] https://developer.download.nvidia.com/hpc-sdk/ubuntu/amd64 /' \
            | sudo tee /etc/apt/sources.list.d/nvhpc.list
          sudo apt-get update -y
          sudo apt-get install -y "${NVHPC_APT_PACKAGE}"
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Configure NVHPC environment
        run: |
          nvarch="$(uname -s)_$(uname -m)"
          echo "NVARCH=${nvarch}" >> "$GITHUB_ENV"
          echo "NVCOMPILERS=/opt/nvidia/hpc_sdk" >> "$GITHUB_ENV"
          echo "/opt/nvidia/hpc_sdk/${nvarch}/${NVHPC_VERSION}/compilers/bin" >> "$GITHUB_PATH"

      - name: Show NVHPC compiler
        run: |
          nvfortran --version
          cmake --version

      - name: Configure (NVHPC serial)
        run: FC=nvfortran cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify serial smoke test registration
        run: |
          for test_name in \
            ftimer_phase0_smoke \
            ftimer_installed_package_consumer \
            ftimer_installed_package_consumer_absolute_includedir \
            ftimer_absolute_includedir_destdir_install \
            ftimer_basic_usage_smoke \
            ftimer_instrumentation_facade_enabled_smoke \
            ftimer_instrumentation_facade_disabled_smoke; do
            test_listing="$(ctest --test-dir build -N -R "^${test_name}$")"
            echo "${test_listing}"
            if [[ "${test_listing}" != *"Test #"* ]]; then
              echo "::error::CTest target not registered: ${test_name}"
              ctest --test-dir build -N
              exit 1
            fi
          done

      - name: Diagnose phase0 smoke with NVHPC runtime traceback
        env:
          FTIMER_START_TRACE: "1"
          NVCOMPILER_TERM: trace,abort
        run: ./build/tests/ftimer_phase0_smoke

      - name: Serial smoke and installed-consumer checks
        env:
          NVCOMPILER_TERM: trace,abort
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error -R '^(ftimer_phase0_smoke|ftimer_installed_package_consumer|ftimer_installed_package_consumer_absolute_includedir|ftimer_absolute_includedir_destdir_install|ftimer_basic_usage_smoke|ftimer_instrumentation_facade_enabled_smoke|ftimer_instrumentation_facade_disabled_smoke)$'

  build-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      # MPI smoke tests validate the MPI-enabled build path (no pFUnit required).
      # pFUnit MPI behavioral tests run in the test-mpi job below.
      - name: Configure (MPI)
        run: cmake -B build -DFTIMER_USE_MPI=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-mpi-mpich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake mpich libmpich-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Resolve MPICH tools
        run: |
          if command -v mpifort.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpifort.mpich)"
          elif command -v mpif90.mpich >/dev/null 2>&1; then
            mpich_fc="$(command -v mpif90.mpich)"
          else
            echo "No MPICH Fortran wrapper found on PATH." >&2
            exit 1
          fi

          if command -v mpiexec.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpiexec.mpich)"
          elif command -v mpirun.mpich >/dev/null 2>&1; then
            mpich_mpiexec="$(command -v mpirun.mpich)"
          else
            echo "No MPICH launcher found on PATH." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/mpich-bin"
          ln -sf "$mpich_fc" "$RUNNER_TEMP/mpich-bin/mpifort"
          ln -sf "$mpich_mpiexec" "$RUNNER_TEMP/mpich-bin/mpiexec"
          echo "$RUNNER_TEMP/mpich-bin" >> "$GITHUB_PATH"
          echo "FTIMER_MPICH_FC=$mpich_fc" >> "$GITHUB_ENV"
          echo "FTIMER_MPICH_MPIEXEC=$mpich_mpiexec" >> "$GITHUB_ENV"

      - name: Show MPICH toolchain
        run: |
          "$FTIMER_MPICH_FC" --version
          "$FTIMER_MPICH_MPIEXEC" --version

      # MPICH smoke coverage uses the wrapper compiler explicitly, including
      # the configure-time mpi_f08 probe and installed MPI consumer check.
      - name: Configure (MPICH MPI)
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DMPIEXEC_EXECUTABLE="$FTIMER_MPICH_MPIEXEC"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

      - name: Verify MPICH example and installed-consumer coverage
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_mpi_example_smoke$'
          ctest --test-dir build --output-on-failure --no-tests=error -R '^ftimer_installed_package_consumer_mpi$'

  test-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built without MPI in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-mpi:
    runs-on: ubuntu-latest
    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      OMPI_MCA_rmaps_base_oversubscribe: 1
      PRTE_MCA_rmaps_default_mapping_policy: :oversubscribe
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=mpifort cmake -B build -DFTIMER_USE_MPI=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      # OpenMP smoke tests validate the OpenMP-enabled build path (no pFUnit required).
      # pFUnit OpenMP behavioral tests run in the test-openmp job below.
      - name: Configure (OpenMP)
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  build-contract-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake make libopenmpi-dev openmpi-bin flang-19

      # These checks cover the configure-time negative gates and the Makefile
      # wrapper defaults that Issue #51 tracks as automated regressions.
      - name: Configure contract checks
        run: cmake -B build-contract -DFTIMER_BUILD_EXAMPLES=OFF

      - name: Run contract regression tests
        run: ctest --test-dir build-contract --output-on-failure -R "ftimer_(configure|make)_.*contracts"

  test-openmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # MPI is needed to build pFUnit (pfunit.mod requires MPI=YES).
      # fTimer itself is built with OpenMP (not MPI) in this job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake libopenmpi-dev openmpi-bin

      - name: Capture pFUnit cache identity
        id: pfunit-identity
        run: |
          {
            cat /etc/os-release
            uname -a
            gfortran --version
            mpifort --version
            mpirun --version
            cmake --version
          } > /tmp/pfunit-cache-identity.txt
          identity="$(sha256sum /tmp/pfunit-cache-identity.txt | cut -d ' ' -f1)"
          echo "key=$identity" >> "$GITHUB_OUTPUT"

      - name: Cache pFUnit
        uses: actions/cache@v4
        id: pfunit-cache
        with:
          path: /opt/pfunit
          key: pfunit-${{ runner.os }}-${{ steps.pfunit-identity.outputs.key }}-${{ env.PFUNIT_VERSION }}-${{ env.PFUNIT_SHA256 }}

      - name: Build pFUnit
        if: steps.pfunit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/pfunit-src
          curl -fsSL "$PFUNIT_ARCHIVE_URL" -o /tmp/pfunit.tar
          printf '%s  %s\n' "$PFUNIT_SHA256" /tmp/pfunit.tar | sha256sum -c -
          tar -xf /tmp/pfunit.tar --strip-components=1 -C /tmp/pfunit-src
          FC=mpifort cmake -B /tmp/pfunit-build -S /tmp/pfunit-src -DCMAKE_INSTALL_PREFIX=/opt/pfunit -DMPI=YES
          cmake --build /tmp/pfunit-build -j$(nproc)
          cmake --install /tmp/pfunit-build

      - name: Configure
        run: FC=gfortran cmake -B build -DFTIMER_USE_OPENMP=ON -DFTIMER_BUILD_TESTS=ON -DPFUNIT_DIR=/opt/pfunit

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran cmake

      - name: Configure (bench)
        run: cmake -B build -DFTIMER_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install fprettify
        run: python3 -m pip install --constraint .github/constraints/lint.txt fprettify

      - name: Check formatting
        run: |
          find src -name '*.F90' -exec fprettify --diff {} +
          find tests -name '*.pf' -exec fprettify --diff {} +
          find tests -name '*.F90' -exec fprettify --diff {} +
          find examples -name '*.F90' -exec fprettify --diff {} +

      - name: Check manual fallback audit helper
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/test_check_manual_fallback_audit.py
